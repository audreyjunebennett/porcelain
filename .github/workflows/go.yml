name: Go

on:
  push:
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - "Makefile"
      - ".goreleaser.yaml"
      - "docs/packaging.md"
      - "chimera/deps.lock"
      - "packaging/**"
      - "scripts/**"
      - "chimera/**"
      - "locus/**"
      - ".github/workflows/go.yml"
      - ".github/workflows/release.yml"
  pull_request:
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - "Makefile"
      - ".goreleaser.yaml"
      - "docs/packaging.md"
      - "chimera/deps.lock"
      - "packaging/**"
      - "scripts/**"
      - "chimera/**"
      - "locus/**"
      - ".github/workflows/go.yml"
      - ".github/workflows/release.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: fmt-check, vet, test
        env:
          SKIP_DESKTOP: "1"
        run: make fmt-check vet test

  # Validates .goreleaser.yaml and produces snapshot archives; smoke-run linux amd64 binaries.
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

      - name: Snapshot smoke (Chimera release binaries)
        run: bash scripts/ci-release-smoke.sh

  # Desktop: webview_go + CGO (linux-amd64).
  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Linux dependencies (WebKitGTK)
        run: |
          sudo apt-get update
          # Noble+ dropped libwebkit2gtk-4.0-dev; webview_go still uses pkg-config webkit2gtk-4.0.
          sudo apt-get install -y gcc pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo mkdir -p /usr/local/lib/pkgconfig
          # pkgconf (Ubuntu's pkg-config) does not support --print-filename; use dpkg.
          wk41_pc=$(dpkg -L libwebkit2gtk-4.1-dev | grep -E '/webkit2gtk-4\.1\.pc$' | head -n1)
          test -n "$wk41_pc" && test -f "$wk41_pc"
          sudo ln -sf "$wk41_pc" /usr/local/lib/pkgconfig/webkit2gtk-4.0.pc

      - name: Vet and test (locus-desktop)
        env:
          CGO_ENABLED: "1"
        run: make vet locus-desktop-test

      - name: Build locus-desktop
        env:
          CGO_ENABLED: "1"
        run: make locus-desktop-build
