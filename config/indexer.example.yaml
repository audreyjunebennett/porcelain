# Copy to `indexer.yaml` via `make chimera-indexer-configure` (or `make configure`).
# Full reference: docs/indexer.md
#
# Comment style in this file:
#   - Block comments introduce each configuration group.
#   - Active settings have a short comment on the line above the key.
#   - Optional overrides appear as commented lines (# key: value) directly under the field they replace.
#
# Secrets stay in the environment (never in YAML):
#   CHIMERA_GATEWAY_URL   — overrides gateway_url when set
#   CHIMERA_GATEWAY_TOKEN — required for ingest (Bearer token from api-keys.yaml)

# Gateway connectivity.
#
# Must match gateway.listen_port in config/gateway.yaml (default 3000). Not the broker port (8080).
gateway_url: "http://127.0.0.1:3000"

# Watch roots and ingest scope.
#
# Supervised mode: leave roots empty; paths come from GET /v1/indexer/workspaces (/ui/settings).
# Standalone mode: set roots and optional defaults / overrides below.
roots: []
# defaults:
#   project_id: "my-app"
#   flavor_id: "default"
#   workspace_id: "my-app"
# roots:
#   - path: "./apps/web"
#     project_id: "web"
#   - path: "./legacy"
#     flavor_id: "legacy-corpus"
# overrides:
#   - glob: "**/*.md"
#     flavor_id: "docs"
#     workspace_id: "docs"

# Ignore rules (merged with built-in defaults, .chimeraignore, and .gitignore per root).
ignore_extra:
  - "tmp/"
  - "*.snapshot"

# Ingest recovery and retries.
#
# Workers pause when GET /v1/indexer/storage/health is not ingest-ready, then poll on the interval below.
retry_max_attempts: 5
retry_base_delay_ms: 500
retry_max_delay_ms: 30000
recovery_poll_interval_ms: 30000
# retry_short_circuit_on_embed: true
# recovery_include_root_health: true

# Concurrency and filesystem watch.
debounce_ms: 750
workers: 4
queue_depth: 1024
# queue_fanout_high_water_mark_percent: 75

# File and HTTP limits.
max_file_bytes: 8388608
request_timeout_ms: 60000
# Indexer cap for whole-body manifest ingest; gateway may allow a higher max_whole_file_bytes.
max_whole_file_bytes: 512000
# binary_null_byte_sample_bytes: 8000
# binary_null_byte_ratio: 0.001

# Local persistence (sync-state.sqlite + optional legacy .json anchor).
#
# Path is relative to the process working directory (repo root under chimera-supervisor).
# SQLite file: sync-state.sqlite in the same directory as this path.
# Omit sync_state_path to default to indexer.sync-state.json beside this config file.
sync_state_path: "data/indexer/sync-state.json"

# Supervised mode: how often to poll GET /v1/indexer/workspaces for path changes (default 30000).
# workspaces_poll_interval_ms: 30000

# Operator log verbosity (stderr; supervised --log-json still applies).
#
# storage_stats_poll_ms and scope_status_poll_ms: negative disables periodic lines.
storage_stats_poll_ms: -1
scope_status_poll_ms: -1
# log_level: info
job_skip_log: debug
job_ingest_log: debug
# skip_summary_min_interval_ms: 5000
# scope_active_file_log_min_interval_ms: 2000
# scope_status_ingest_milestone: 25
# scope_status_edge_min_interval_ms: 2000
# queue_snapshot_idle_info_interval_ms: 300000
