# Copy to `gateway.yaml` and edit. Full reference: docs/configuration.md
#
# Comment style in this file:
#   - Block comments introduce each top-level section.
#   - Active settings have a short comment on the line above the key.
#   - Optional overrides appear as commented lines (# key: value) directly under the field they replace.

# chimera-gateway: client-facing API, operator UI, routing, and RAG orchestration.
#
# Binds HTTP (listen_host / listen_port). Virtual models are configured in operator settings (SQLite).
gateway:
  # Gateway release semver (display / diagnostics).
  semver: "0.2.0"
  # HTTP listen address for chimera-gateway.
  listen_host: "127.0.0.1"
  listen_port: 3000
  # Levels: trace | debug | info | warn | error. Empty or unknown → info.
  # LOG_LEVEL in the environment overrides this value.
  log_level: "info"
  # chimera-broker logging is separate: broker.log_level below.
  #
  # Optional redacted request/response snippets (msg = conversation.payload.sample).
  # Witness summaries at info are independent of this block.
  # log_witness:
  #   payload_sample_max_chars: 256
  #   force_payload_sample_at_debug: false

# chimera-broker: OpenAI-compatible LLM relay (chat, models, embeddings for RAG).
#
# The gateway sends provider traffic here (broker.base_url). Under chimera-supervisor this
# is usually a local wrapper; provider API keys live in the broker config, not here.
broker:
  # Base URL for chimera-broker (no trailing slash required).
  base_url: "http://127.0.0.1:8080"
  # Environment variable name for the Bearer token sent to chimera-broker.
  api_key_env: "CHIMERA_BROKER_API_KEY"
  # Log level for the chimera-broker wrapper subprocess (typical: info | debug).
  log_level: "info"
  # Bearer token for chimera-broker /v1/* when not using api_key_env.
  # When omitted and api_key_env is unset, a secret is generated on first start and written here.
  # api_key: ""

# chimera-vectorstore: vector database for semantic search (RAG collections).
#
# chimera-gateway reads and writes vectors at this HTTP URL when rag.enabled is true.
# Log level applies when chimera-supervisor runs the vectorstore wrapper with a storage child.
vectorstore:
  url: "http://127.0.0.1:6333"
  # Storage-backend log level when chimera-vectorstore supervises the child process.
  log_level: "info"
  # api_key: ""

# Timeouts and background checks against chimera-broker and related probes.
#
# Used for GET /health, catalog polling in /ui/logs, and upstream chat completion deadlines.
health:
  # Timeout (ms) for chimera-broker health and GET /v1/models catalog fetch.
  timeout_ms: 5000
  # Timeout (ms) per chimera-broker POST /v1/chat/completions attempt.
  chat_timeout_ms: 30000
  # Period (ms) for chimera-broker GET /v1/models. 0 = disable polling.
  available_models_poll_ms: 30000
  # Optional explicit health probe URL (default: {broker.base_url}/health).
  # upstream_url: "http://127.0.0.1:8080/health"

# Paths to companion YAML files (relative to this file unless absolute).
#
# Reloaded when the file mtime changes (gateway.yaml also reloads when provider-free-tier changes).
paths:
  api_keys: "./api-keys.yaml"
  provider_free_tier: "./provider-free-tier.yaml"
  provider_model_limits: "./provider-model-limits.yaml"

# Gateway metrics: SQLite usage and chat outcomes for quotas and operator views.
#
# Applied at process start only (changing paths requires a restart). When enabled, supports
# provider_model_limits enforcement.
metrics:
  enabled: true
  # sqlite_path: "../data/gateway/metrics.sqlite"
  # migrations_dir: "../migrations/chimera-gateway/metrics"

# Operator database: workspaces, conversations, corpus segment index (manifest ingest).
#
# Opened at default paths unless you uncomment overrides below. Separate from metrics.sqlite.
# operator:
#   sqlite_path: "../data/gateway/operator.sqlite"
#   migrations_dir: "../migrations/chimera-gateway/operator"

# Operator logs UI: ring-buffer retention for supervised /ui/logs.
# operator_logs:
#   indexer_pinned_lines_max: 64

# chimera-indexer: file watcher that ingests workspace files into vectorstore via the gateway.
#
# When supervised.enabled is true, chimera-supervisor starts the indexer after chimera-broker is
# healthy. Set CHIMERA_GATEWAY_TOKEN in the environment for authenticated ingest.
# Watch directories are in operator SQLite (/ui/settings), not in indexer YAML.
# See docs/indexer.md.
indexer:
  supervised:
    # Start chimera-indexer after chimera-broker is healthy (needs CHIMERA_GATEWAY_TOKEN for ingest).
    enabled: true
    # JSON structured logs on stderr (filter /ui/settings by source indexer). false = plain text.
    # log_json: false
    # Optional explicit path to chimera-indexer binary (default: next to gateway or PATH).
    # bin: ""
    # Indexer tuning YAML passed as --config (relative to this file unless absolute).
    # Created by `make chimera-indexer-configure` from config/indexer.example.yaml.
    config_path: "indexer.yaml"
    # Allow supervised indexer when rag.enabled is false (default false).
    # start_when_rag_disabled: false

# Retrieval-augmented generation ("RAG"): manifest ingest, search, coherence, expansion tools.
#
# When enabled, the gateway accepts indexer manifest ingest, serves retrieval at chat time,
# and stores vectors in vectorstore. Indexer chunking uses rag.chunking sizes advertised on
# GET /v1/indexer/config.
rag:
  # Master switch: ingest APIs, indexer APIs, chat-time retrieval, and vectorstore health checks.
  enabled: true
  embedding:
    # Defaults to broker.base_url when empty.
    # base_url: ""
    path: "/v1/embeddings"
    model: "ollama/nomic-embed-text:latest"
    dim: 768
  chunking:
    size: 512
    overlap: 128
  retrieval:
    top_k: 8
    score_threshold: 0.50
  ingest:
    max_bytes: 10485760
    # Single POST /v1/ingest body limit; larger files use session ingest (default: same as max_bytes).
    # max_whole_file_bytes: 2097152
  defaults:
    project_id: "default"
    flavor_id: ""
  # Stale-index warnings in chat (off | warn | strict). strict blocks GET /v1/rag/* expansion.
  coherence:
    mode: warn
  # Workspace expansion APIs: /v1/rag/segments, /context, /adjacent, /tools.
  tooling:
    enabled: true
    # expansion_cache_ttl_seconds: 300
    # expansion_cache_max_entries: 256

# Internal embedding provider: supervised chimera-embed + llama-server (optional).
#
# Off unless enabled. When on, point rag.embedding at the local /v1/embeddings endpoint.
# internal_embedding:
#   enabled: false
#   provider: "internal"
#   model: "internal/nomic-embed-text"
#   dim: 768
#   base_url: "http://127.0.0.1:8090"
#   model_path: "../data/embedding/models/nomic-embed-text.gguf"
#   cache_dir: "../data/embedding/cache"
#   log_level: "info"
